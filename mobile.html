<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desktop Required</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b,#111827);
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

/* Animated background */
body::before{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:#3b82f6;
    border-radius:50%;
    filter:blur(180px);
    top:-150px;
    left:-150px;
    opacity:.35;
}

body::after{
    content:"";
    position:absolute;
    width:450px;
    height:450px;
    background:#9333ea;
    border-radius:50%;
    filter:blur(180px);
    bottom:-150px;
    right:-150px;
    opacity:.3;
}

.card{
    position:relative;
    z-index:2;
    width:90%;
    max-width:520px;
    padding:50px 40px;
    text-align:center;

    background:rgba(255,255,255,.08);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.15);
    border-radius:24px;

    box-shadow:0 25px 60px rgba(0,0,0,.45);

    animation:fadeIn .8s ease;
}

.icon{
    font-size:70px;
    margin-bottom:20px;
}

h1{
    font-size:2rem;
    margin-bottom:15px;
    font-weight:700;
}

p{
    color:#d1d5db;
    font-size:1rem;
    line-height:1.7;
    margin-bottom:35px;
}

.button{
    display:inline-block;
    text-decoration:none;
    padding:14px 30px;
    border-radius:50px;
    background:linear-gradient(90deg,#3b82f6,#6366f1);
    color:white;
    font-weight:600;
    transition:.3s;
}

.button:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 30px rgba(59,130,246,.45);
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(25px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<div class="card">

    <div class="icon">🖥️</div>

    <h1>Desktop Required</h1>

    <p>
        This website is currently optimized for desktop and laptop computers.
        Please open it from a larger screen to access all features.
    </p>

    <a href="javascript:history.back()" class="button">Go Back</a>

</div>

</body>
</html>
